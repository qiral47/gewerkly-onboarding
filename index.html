<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gewerkly – Website-Onboarding</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0efe8; }
    input, textarea, button, select { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

const SERVICES = [
  "Dachsanierung",
  "Dachreparatur",
  "Flachdach",
  "Dachfenster",
  "Dachrinne & Entwässerung",
  "Dachisolierung & Dämmung",
  "Dachbeschichtung",
  "Sturmschaden-Reparatur",
  "Schornsteinarbeiten",
  "Fassadenarbeiten",
  "Klempnerarbeiten",
  "Notdienst",
];

const STEPS = [
  { id: "willkommen", label: "Willkommen" },
  { id: "kontakt", label: "Kontaktdaten" },
  { id: "leistungen", label: "Leistungen" },
  { id: "ueber", label: "Über uns" },
  { id: "zahlung", label: "Zahlung" },
  { id: "rechtliches", label: "Rechtliches" },
  { id: "fertig", label: "Abschluss" },
];

function StepIndicator({ current, steps }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 0, margin: "0 0 2.5rem", padding: "0 0.5rem" }}>
      {steps.map((s, i) => {
        const done = i < current;
        const active = i === current;
        return (
          <div key={s.id} style={{ display: "flex", alignItems: "center", flex: i < steps.length - 1 ? 1 : "none" }}>
            <div style={{
              width: 32, height: 32, borderRadius: "50%",
              background: done ? "#1a5c3a" : active ? "#fff" : "transparent",
              border: active ? "2px solid #1a5c3a" : done ? "2px solid #1a5c3a" : "2px solid #c8c8c0",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 13, fontWeight: 500, flexShrink: 0,
              color: done ? "#fff" : active ? "#1a5c3a" : "#999",
              transition: "all 0.3s ease"
            }}>
              {done ? "\u2713" : i + 1}
            </div>
            {i < steps.length - 1 && (
              <div style={{
                flex: 1, height: 2, margin: "0 6px",
                background: done ? "#1a5c3a" : "#e0dfda",
                transition: "background 0.3s ease"
              }} />
            )}
          </div>
        );
      })}
    </div>
  );
}

function Input({ label, value, onChange, type = "text", placeholder, required, disabled }) {
  return (
    <div style={{ marginBottom: "1.25rem" }}>
      <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#5a5a52", marginBottom: 6, letterSpacing: "0.02em" }}>
        {label} {required && <span style={{ color: "#b5442d" }}>*</span>}
      </label>
      <input
        type={type}
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        disabled={disabled}
        style={{
          width: "100%", padding: "12px 16px", fontSize: 15,
          border: "1.5px solid #ddddd5", borderRadius: 8,
          background: disabled ? "#f5f5f0" : "#fff",
          color: "#2a2a28", outline: "none",
          transition: "border-color 0.2s",
          boxSizing: "border-box",
          fontFamily: "inherit"
        }}
        onFocus={e => e.target.style.borderColor = "#1a5c3a"}
        onBlur={e => e.target.style.borderColor = "#ddddd5"}
      />
    </div>
  );
}

function Textarea({ label, value, onChange, placeholder, rows = 4 }) {
  return (
    <div style={{ marginBottom: "1.25rem" }}>
      <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#5a5a52", marginBottom: 6, letterSpacing: "0.02em" }}>
        {label}
      </label>
      <textarea
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        rows={rows}
        style={{
          width: "100%", padding: "12px 16px", fontSize: 15,
          border: "1.5px solid #ddddd5", borderRadius: 8,
          background: "#fff", color: "#2a2a28", outline: "none",
          resize: "vertical", fontFamily: "inherit",
          transition: "border-color 0.2s",
          boxSizing: "border-box",
          lineHeight: 1.6
        }}
        onFocus={e => e.target.style.borderColor = "#1a5c3a"}
        onBlur={e => e.target.style.borderColor = "#ddddd5"}
      />
    </div>
  );
}

function Checkbox({ label, checked, onChange, style: extraStyle }) {
  return (
    <label style={{
      display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer",
      marginBottom: 10, fontSize: 14, color: "#3a3a38", lineHeight: 1.5,
      ...extraStyle
    }}>
      <div
        onClick={e => { e.preventDefault(); onChange(!checked); }}
        style={{
          width: 20, height: 20, borderRadius: 5, flexShrink: 0, marginTop: 1,
          border: checked ? "none" : "1.5px solid #c8c8c0",
          background: checked ? "#1a5c3a" : "#fff",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "all 0.15s ease", cursor: "pointer"
        }}
      >
        {checked && <span style={{ color: "#fff", fontSize: 13, fontWeight: 700 }}>{"\u2713"}</span>}
      </div>
      <span>{label}</span>
    </label>
  );
}

function GewerklyOnboarding() {
  // ── Injected by Gewerkly deploy ──
  const PAYMENT_CHECK_URL = "https://qiral.app.n8n.cloud/webhook/payment-check";
  const FORM_SUBMIT_URL   = "https://qiral.app.n8n.cloud/webhook/onboarding-submit";

  const [step, setStep] = useState(0);
  const [legalModal, setLegalModal] = useState(null);
  const [cookieConsent, setCookieConsent] = useState(null);
  const [paymentComplete, setPaymentComplete] = useState(false);
  const [pollingPayment, setPollingPayment] = useState(false);
  const [pollingTimeout, setPollingTimeout] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [form, setForm] = useState({ record_id: "",
    firma: "", ansprechpartner: "", telefon: "", email: "", adresse: "", plz: "", ort: "",
    services: [], customService: "",
    ueberText: "", stichpunkte: "", useAI: false,
    teamImage: null, teamImagePreview: null,
    agb: false, datenschutz: false, widerruf: false
  });

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const firma = params.get("firma") || "";
    const telefon = params.get("telefon") || "";
    const email = params.get("email") || "";
    const recordId = params.get("record_id") || "";
    if (firma || telefon || email) {
      setForm(f => ({ ...f, firma: firma || f.firma, telefon: telefon || f.telefon, email: email || f.email, record_id: recordId }));
    }
  }, []);


  // ── Payment polling ──
  useEffect(() => {
    if (!pollingPayment) return;
    let attempts = 0;
    const maxAttempts = 120;
    const id = setInterval(async () => {
      attempts++;
      if (attempts > maxAttempts) {
        clearInterval(id);
        setPollingTimeout(true);
        setPollingPayment(false);
        return;
      }
      const recordId = new URLSearchParams(window.location.search).get("record_id") || "";
      if (!recordId) { clearInterval(id); setPollingTimeout(true); setPollingPayment(false); return; }
      try {
        const resp = await fetch(PAYMENT_CHECK_URL + "?record_id=" + encodeURIComponent(recordId));
        const data = await resp.json();
        if (data.paid) {
          clearInterval(id);
          setPaymentComplete(true);
          setPollingPayment(false);
        }
      } catch(e) { /* ignore fetch errors, keep polling */ }
    }, 5000);
    return () => clearInterval(id);
  }, [pollingPayment]);

  const fileRef = useRef(null);
  const set = (key, val) => setForm(f => ({ ...f, [key]: val }));
  const toggleService = (s) => set("services", form.services.includes(s) ? form.services.filter(x => x !== s) : [...form.services, s]);

  const handleImage = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => set("teamImagePreview", ev.target.result);
    reader.readAsDataURL(file);
    set("teamImage", file);
  };


  // ── Form submit handler ──
  const handleSubmit = async () => {
    setSubmitting(true);
    const recordId = new URLSearchParams(window.location.search).get("record_id") || form.record_id || "";
    let teamImageBase64 = "";
    if (fileRef.current && fileRef.current.files[0]) {
      teamImageBase64 = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(fileRef.current.files[0]);
      });
    }
    const payload = {
      record_id: recordId,
      firma: form.firma,
      ansprechpartner: form.ansprechpartner,
      telefon: form.telefon,
      email: form.email,
      adresse: form.adresse,
      plz: form.plz,
      ort: form.ort,
      services: form.services,
      customService: form.customService || "",
      ueberText: form.ueberText || "",
      stichpunkte: form.stichpunkte || "",
      useAI: !!(form.stichpunkte && form.stichpunkte.trim()),
      teamImage: teamImageBase64
    };
    try {
      await fetch(FORM_SUBMIT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    } catch(e) { /* log but continue */ }
    setSubmitting(false);
  };

  const next = () => setStep(s => Math.min(s + 1, STEPS.length - 1));
  const prev = () => setStep(s => Math.max(s - 1, 0));

  const canNext = () => {
    if (step === 1) return form.firma && form.ansprechpartner && form.telefon && form.email;
    if (step === 2) return form.services.length > 0;
    if (step === 4) return paymentComplete;
    if (step === 5) return form.agb && form.datenschutz && form.widerruf;
    return true;
  };

  const containerStyle = {
    maxWidth: 640, margin: "0 auto", padding: "2rem 1.5rem",
    fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif",
    color: "#2a2a28", minHeight: "100vh",
    background: "linear-gradient(180deg, #f8f8f4 0%, #f0efe8 100%)"
  };

  const cardStyle = {
    background: "#fff", borderRadius: 14,
    padding: "2rem 2rem", boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
    border: "1px solid #eaeae2"
  };

  const btnPrimary = {
    padding: "14px 32px", fontSize: 15, fontWeight: 600,
    background: "#1a5c3a", color: "#fff", border: "none",
    borderRadius: 8, cursor: "pointer", letterSpacing: "0.01em",
    transition: "all 0.2s", fontFamily: "inherit"
  };

  const btnSecondary = {
    padding: "14px 24px", fontSize: 15, fontWeight: 500,
    background: "transparent", color: "#5a5a52",
    border: "1.5px solid #ddddd5", borderRadius: 8,
    cursor: "pointer", fontFamily: "inherit",
    transition: "all 0.2s"
  };

  const renderStep = () => {
    switch (step) {
      case 0:
        return (
          <div style={{ textAlign: "center", padding: "2rem 0" }}>
            <div style={{
              width: 72, height: 72, borderRadius: "50%", margin: "0 auto 1.5rem",
              background: "#e8f0e8", display: "flex", alignItems: "center", justifyContent: "center"
            }}>
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1a5c3a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </div>
            <h1 style={{ fontSize: 26, fontWeight: 600, margin: "0 0 0.75rem", color: "#1a1a18", letterSpacing: "-0.01em" }}>
              Willkommen bei Gewerkly
            </h1>
            <p style={{ fontSize: 16, color: "#6a6a62", lineHeight: 1.7, margin: "0 0 0.5rem", maxWidth: 440, marginLeft: "auto", marginRight: "auto" }}>
              Ihre neue Website ist fast fertig. In wenigen Minuten vervollständigen Sie Ihre Angaben — dann geht Ihre Seite live.
            </p>
            <p style={{ fontSize: 14, color: "#8a8a82", margin: "1.5rem 0 0" }}>
              Dauer: ca. 5 Minuten
            </p>
          </div>
        );

      case 1:
        return (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 0.25rem", color: "#1a1a18" }}>Kontaktdaten</h2>
            <p style={{ fontSize: 14, color: "#8a8a82", margin: "0 0 1.5rem" }}>Diese Daten erscheinen auf Ihrer Website.</p>
            <Input label="Firmenname" value={form.firma} onChange={v => set("firma", v)} required placeholder="z.B. Dachdeckerei Müller GmbH" />
            <Input label="Ansprechpartner / Geschäftsführer" value={form.ansprechpartner} onChange={v => set("ansprechpartner", v)} required placeholder="Vor- und Nachname" />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <Input label="Telefon" value={form.telefon} onChange={v => set("telefon", v)} required type="tel" placeholder="0511 1234567" />
              <Input label="E-Mail" value={form.email} onChange={v => set("email", v)} required type="email" placeholder="info@firma.de" />
            </div>
            <Input label="Straße & Hausnummer" value={form.adresse} onChange={v => set("adresse", v)} placeholder="Musterstraße 12" />
            <div style={{ display: "grid", gridTemplateColumns: "120px 1fr", gap: 16 }}>
              <Input label="PLZ" value={form.plz} onChange={v => set("plz", v)} placeholder="30159" />
              <Input label="Ort" value={form.ort} onChange={v => set("ort", v)} placeholder="Hannover" />
            </div>
          </div>
        );

      case 2:
        return (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 0.25rem", color: "#1a1a18" }}>Ihre Leistungen</h2>
            <p style={{ fontSize: 14, color: "#8a8a82", margin: "0 0 1.5rem" }}>Wählen Sie aus, was auf der Website angezeigt wird.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
              {SERVICES.map(s => (
                <Checkbox key={s} label={s} checked={form.services.includes(s)} onChange={() => toggleService(s)} />
              ))}
            </div>
            <div style={{ marginTop: "1.25rem", paddingTop: "1.25rem", borderTop: "1px solid #eaeae2" }}>
              <Textarea
                label="Weitere Leistungen (optional)"
                value={form.customService}
                onChange={v => set("customService", v)}
                placeholder="z.B. Solarmontage, Terrassendach, Carport ..."
                rows={2}
              />
            </div>
          </div>
        );

      case 3:
        return (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 0.25rem", color: "#1a1a18" }}>Über Ihren Betrieb</h2>
            <p style={{ fontSize: 14, color: "#8a8a82", margin: "0 0 1.5rem" }}>Ein persönlicher Eindruck schafft Vertrauen bei Ihren Kunden.</p>

            <div style={{
              border: "2px dashed #ddddd5", borderRadius: 12, padding: "2rem",
              textAlign: "center", cursor: "pointer", marginBottom: "1.5rem",
              background: form.teamImagePreview ? "transparent" : "#fafaf7",
              transition: "border-color 0.2s", position: "relative", overflow: "hidden"
            }}
              onClick={() => fileRef.current?.click()}
              onMouseOver={e => e.currentTarget.style.borderColor = "#1a5c3a"}
              onMouseOut={e => e.currentTarget.style.borderColor = "#ddddd5"}
            >
              {form.teamImagePreview ? (
                <div>
                  <img src={form.teamImagePreview} alt="Team" style={{ maxWidth: "100%", maxHeight: 220, borderRadius: 8, objectFit: "cover" }} />
                  <p style={{ fontSize: 13, color: "#8a8a82", margin: "0.75rem 0 0" }}>Klicken um anderes Bild zu wählen</p>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize: 36, marginBottom: 8, opacity: 0.3 }}>
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.5">
                      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                      <circle cx="8.5" cy="8.5" r="1.5"/>
                      <polyline points="21 15 16 10 5 21"/>
                    </svg>
                  </div>
                  <p style={{ fontSize: 15, fontWeight: 500, color: "#5a5a52", margin: "0 0 4px" }}>Foto hochladen</p>
                  <p style={{ fontSize: 13, color: "#aaa" }}>Geschäftsführer, Team oder Firmenfahrzeug</p>
                  <p style={{ fontSize: 12, color: "#bbb", marginTop: 4 }}>JPG, PNG — max. 5 MB</p>
                </div>
              )}
              <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} style={{ display: "none" }} />
            </div>

            <div style={{
              display: "flex", gap: 8, marginBottom: "1rem",
              background: "#f5f5f0", borderRadius: 8, padding: 4
            }}>
              <button
                onClick={() => set("useAI", false)}
                style={{
                  flex: 1, padding: "10px 0", fontSize: 14, fontWeight: 500,
                  border: "none", borderRadius: 6, cursor: "pointer",
                  background: !form.useAI ? "#fff" : "transparent",
                  color: !form.useAI ? "#1a1a18" : "#8a8a82",
                  boxShadow: !form.useAI ? "0 1px 2px rgba(0,0,0,0.06)" : "none",
                  fontFamily: "inherit", transition: "all 0.2s"
                }}
              >Selbst schreiben</button>
              <button
                onClick={() => set("useAI", true)}
                style={{
                  flex: 1, padding: "10px 0", fontSize: 14, fontWeight: 500,
                  border: "none", borderRadius: 6, cursor: "pointer",
                  background: form.useAI ? "#fff" : "transparent",
                  color: form.useAI ? "#1a1a18" : "#8a8a82",
                  boxShadow: form.useAI ? "0 1px 2px rgba(0,0,0,0.06)" : "none",
                  fontFamily: "inherit", transition: "all 0.2s"
                }}
              >Text generieren lassen</button>
            </div>

            {form.useAI ? (
              <Textarea
                label="Stichpunkte über Ihren Betrieb"
                value={form.stichpunkte}
                onChange={v => set("stichpunkte", v)}
                placeholder={"z.B.:\n- Meisterbetrieb seit 1998\n- 8 Mitarbeiter\n- Spezialisiert auf Steildach\n- Familienbetrieb in 2. Generation"}
                rows={5}
              />
            ) : (
              <Textarea
                label="Über uns — Text"
                value={form.ueberText}
                onChange={v => set("ueberText", v)}
                placeholder="Beschreiben Sie Ihren Betrieb in ein paar Sätzen. Was macht Sie besonders? Wie lange gibt es Sie schon?"
                rows={5}
              />
            )}
            {form.useAI && (
              <p style={{ fontSize: 13, color: "#8a8a82", margin: "-0.5rem 0 0", lineHeight: 1.5 }}>
                Wir erstellen aus Ihren Stichpunkten einen professionellen Text für die Website.
              </p>
            )}
          </div>
        );

      case 4:
        return (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 0.25rem", color: "#1a1a18" }}>Zahlung</h2>
            <p style={{ fontSize: 14, color: "#8a8a82", margin: "0 0 1.5rem" }}>Ihr Tarif: 69 € / Monat — Mindestlaufzeit 6 Monate.</p>

            <div style={{
              background: "#f8f8f4", borderRadius: 12, padding: "1.5rem",
              border: "1px solid #eaeae2", marginBottom: "1.5rem"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
                <span style={{ fontSize: 15, fontWeight: 500 }}>Gewerkly Website</span>
                <span style={{ fontSize: 22, fontWeight: 600, color: "#1a5c3a" }}>69 €<span style={{ fontSize: 14, fontWeight: 400, color: "#8a8a82" }}> / Monat</span></span>
              </div>
              <div style={{ borderTop: "1px solid #e0dfda", paddingTop: 12, fontSize: 14, color: "#6a6a62", lineHeight: 1.8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: "#1a5c3a" }}>{"\u2713"}</span> Professionelle Website mit Ihrem Branding
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: "#1a5c3a" }}>{"\u2713"}</span> Mobiloptimiert & SSL-geschützt
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: "#1a5c3a" }}>{"\u2713"}</span> Google-Bewertungen integriert
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: "#1a5c3a" }}>{"\u2713"}</span> Kontaktformular & Click-to-Call
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: "#1a5c3a" }}>{"\u2713"}</span> Hosting & Wartung inklusive
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: "#1a5c3a" }}>{"\u2713"}</span> 30-Tage-Zufriedenheitsgarantie
                </div>
              </div>
            </div>

            {!paymentComplete ? (
              <div>
                <div style={{
                  background: "#fff", borderRadius: 12, padding: "1.5rem",
                  border: "1.5px solid #eaeae2", textAlign: "center"
                }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 12 }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6772e5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                      <line x1="1" y1="10" x2="23" y2="10"/>
                    </svg>
                    <span style={{ fontSize: 15, fontWeight: 500, color: "#3a3a38" }}>Sichere Zahlung über Stripe</span>
                  </div>
                  <p style={{ fontSize: 13, color: "#8a8a82", lineHeight: 1.6, margin: "0 0 1.25rem" }}>
                    Klicken Sie auf den Button um die Zahlung einzurichten. Stripe bietet Ihnen Kreditkarte, SEPA-Lastschrift, Google Pay, Apple Pay und weitere Optionen.
                  </p>
                  <button
                    onClick={() => {
                      const recordId = new URLSearchParams(window.location.search).get("record_id") || "";
                      const stripeUrl = "STRIPE_PAYMENT_LINK_PLACEHOLDER" + (recordId ? "?client_reference_id=" + encodeURIComponent(recordId) : "");
                      window.open(stripeUrl, "_blank");

            ) : (

            </div>
          </div>
        </div>
      )}

      {cookieConsent === null && (
        <div style={{
          position: "fixed", bottom: 0, left: 0, right: 0,

          <div style={{ maxWidth: 640, margin: "0 auto" }}>
            <p style={{ fontSize: 14, color: "#3a3a38", lineHeight: 1.7, margin: "0 0 1rem" }}>

              Mehr dazu in unserer{" "}
              <a href="#" onClick={e => { e.preventDefault(); setLegalModal("datenschutz"); }}

            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>

    </div>
  );
}
